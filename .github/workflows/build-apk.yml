name: Build Release APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.19.0'

      - name: Build Release APK
        run: |
          cd /tmp
          flutter create --project-name my_third_app3 --org com.lrq128 --platforms android app_build
          cd /tmp/app_build
          
          # Only replace lib/ and server/ - keep everything else from fresh project
          rm -rf lib/ server/
          cp -r "${GITHUB_WORKSPACE}/lib" lib/
          cp -r "${GITHUB_WORKSPACE}/server" server/
          
          # Merge pubspec dependencies (add ours to generated one)
          OUR_DEPS=$(grep -A 100 '^dependencies:' "${GITHUB_WORKSPACE}/pubspec.yaml" | grep -v '^dependencies:' | grep -B 100 '^dev_dependencies:' | grep -v '^dev_dependencies:' | grep -v '^flutter:' | sed '/^$/d')
          echo "" >> pubspec.yaml
          echo "# Custom dependencies" >> pubspec.yaml
          echo "$OUR_DEPS" >> pubspec.yaml
          
          # Add assets section
          echo "" >> pubspec.yaml
          echo "flutter:" >> pubspec.yaml
          echo "  uses-material-design: true" >> pubspec.yaml
          echo "  assets:" >> pubspec.yaml
          echo "    - assets/" >> pubspec.yaml
          
          cat pubspec.yaml
          
          flutter pub get 2>&1
          flutter build apk --release 2>&1

      - name: Generate keystore and sign APK
        run: |
          APK="/tmp/app_build/build/app/outputs/flutter-apk/app-release.apk"
          ls -la "$APK" || { echo "APK not found!"; exit 1; }
          
          keytool -genkey -v \
            -keystore /tmp/release.jks \
            -alias my-third-app3 \
            -keyalg RSA -keysize 2048 -validity 36500 \
            -storepass app123456 \
            -keypass app123456 \
            -dname "CN=LRQ128, OU=Dev, O=Personal, L=BJ, ST=BJ, C=CN"

          APKSIGNER=$(find "${ANDROID_HOME}/build-tools" -name "apksigner" -type f 2>/dev/null | sort -V | tail -1)
          echo "Using: $APKSIGNER"
          
          "$APKSIGNER" sign \
            --ks /tmp/release.jks \
            --ks-key-alias my-third-app3 \
            --ks-pass pass:app123456 \
            --key-pass pass:app123456 \
            --v1-signing-enabled true \
            --v2-signing-enabled true \
            --v3-signing-enabled true \
            "$APK"
          
          "$APKSIGNER" verify --verbose "$APK"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: AI修图 v${{ github.run_number }}
          body: |
            ## AI修图 App v${{ github.run_number }}
            
            自动构建发布版本
          files: /tmp/app_build/build/app/outputs/flutter-apk/app-release.apk
          generate_release_notes: false
