name: Build Release APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

env:
  PUB_HOSTED_URL: https://pub.flutter-io.cn
  FLUTTER_STORAGE_BASE_URL: https://storage.flutter-io.cn

jobs:
  build:
    permissions:
      contents: write
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.x'
          channel: 'stable'
          cache: true

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Build APK
        run: |
          set -ex
          max_retry=2
          for attempt in $(seq 0 $max_retry); do
            if [ $attempt -gt 0 ]; then echo "Retry $attempt..."; sleep 30; fi
            flutter create --project-name my_third_app3 --org com.lrq128 --platforms android /tmp/ab && \
            rm -rf /tmp/ab/lib/ && \
            cp -r "${GITHUB_WORKSPACE}/lib" /tmp/ab/lib/ && \
            cp -r "${GITHUB_WORKSPACE}/server" /tmp/ab/server/ && \
            cp "${GITHUB_WORKSPACE}/android_overlay/app/src/main/AndroidManifest.xml" /tmp/ab/android/app/src/main/AndroidManifest.xml && \
            cd /tmp/ab && \
            flutter pub add image_picker path_provider permission_handler && \
            flutter build apk --release && \
            ls -la build/app/outputs/flutter-apk/app-release.apk && \
            break || echo "Attempt $attempt failed"
          done

      - name: Sign & Release
        run: |
          set -ex
          APK=/tmp/ab/build/app/outputs/flutter-apk/app-release.apk
          test -f "$APK" || { echo "No APK!"; exit 1; }
          echo "APK: $(stat --printf=%s $APK) bytes"
          
          # Generate keystore
          keytool -genkey -v -keystore /tmp/release.jks -alias key0 \
            -keyalg RSA -keysize 2048 -validity 36500 \
            -storepass abc123 -keypass abc123 \
            -dname "CN=LRQ128, OU=Dev, O=Personal, L=BJ, ST=BJ, C=CN"
          
          # Use jarsigner from JAVA_HOME
          JARSIGNER="${JAVA_HOME}/bin/jarsigner"
          echo "Using: $JARSIGNER"
          "$JARSIGNER" -verbose -sigalg SHA1withRSA -digestalg SHA1 \
            -keystore /tmp/release.jks -storepass abc123 -keypass abc123 \
            "$APK" key0
          echo "Sign exit code: $?"
          
          # Create release
          TAG="v${{ github.run_number }}"
          GH_TOKEN=${{ github.token }} gh release create "$TAG" "$APK" \
            --repo "${GITHUB_REPOSITORY}" \
            --title "AI修图 v${{ github.run_number }}" \
            --notes "修图App v${{ github.run_number }}" \
            --generate-notes=false
