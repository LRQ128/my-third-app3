name: Build Release APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.19.0'

      - name: Generate Flutter scaffold (fix Android platform files)
        run: |
          # Create a temp project to get proper platform scaffolding
          cd /tmp
          flutter create --project-name my_third_app3 --org com.lrq128 temp_xiutu
          ls temp_xiutu/android/

      - name: Copy platform scaffolding into repo
        run: |
          # Replace android/ with properly generated one
          rm -rf android/
          cp -r /tmp/temp_xiutu/android/ android/
          
          # Keep our custom lib/ and server/ and CI config
          # lib/ already pulled from git
          
          flutter pub get

      - name: Build release APK
        run: flutter build apk --release

      - name: Generate keystore and sign APK
        run: |
          mkdir -p android/app
          keytool -genkey -v \
            -keystore android/app/release.jks \
            -alias my-third-app3 \
            -keyalg RSA -keysize 2048 -validity 36500 \
            -storepass app123456 \
            -keypass app123456 \
            -dname "CN=LRQ128, OU=Dev, O=Personal, L=BJ, ST=BJ, C=CN"

          APK="build/app/outputs/flutter-apk/app-release.apk"
          echo "APK: $APK"
          ls -la "$APK"

          APKSIGNER=$(find "${ANDROID_HOME}/build-tools" -name "apksigner" -type f 2>/dev/null | sort -V | tail -1)
          
          if [ -z "$APKSIGNER" ]; then
            APKSIGNER=$(find /usr/local/lib/android/sdk/build-tools -name "apksigner" -type f 2>/dev/null | sort -V | tail -1)
          fi
          
          if [ -z "$APKSIGNER" ]; then
            APKSIGNER=$(find /usr/local -name "apksigner" -type f 2>/dev/null | head -1)
          fi
          
          echo "Using: $APKSIGNER"
          
          "$APKSIGNER" sign \
            --ks android/app/release.jks \
            --ks-key-alias my-third-app3 \
            --ks-pass pass:app123456 \
            --key-pass pass:app123456 \
            --v1-signing-enabled true \
            --v2-signing-enabled true \
            --v3-signing-enabled true \
            "$APK"

          "$APKSIGNER" verify --verbose "$APK"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: AI修图 v${{ github.run_number }}
          body: |
            ## AI修图 App v${{ github.run_number }}
            
            ### 功能
            - 📱 聊天式修图：发图片+打字需求，AI自动处理
            - ✂️ 抠图、换背景、去水印、改字、滤镜
            - 🤖 后端集成美图API专业能力
            - 💳 显示积分消耗和剩余
          files: build/app/outputs/flutter-apk/app-release.apk
          generate_release_notes: false
