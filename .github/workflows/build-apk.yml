name: Build Release APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

env:
  PUB_HOSTED_URL: https://pub.flutter-io.cn
  FLUTTER_STORAGE_BASE_URL: https://storage.flutter-io.cn

jobs:
  build:
    permissions:
      contents: write
      actions: read
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.x'
          channel: 'stable'
          cache: true

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Build APK
        run: |
          set -ex
          max_retry=2
          retry_delay=30
          for attempt in $(seq 0 $max_retry); do
            if [ $attempt -gt 0 ]; then
              echo "Retry attempt $attempt/$max_retry after ${retry_delay}s..."
              sleep $retry_delay
            fi
            flutter create --project-name my_third_app3 --org com.lrq128 --platforms android /tmp/ab && \
            rm -rf /tmp/ab/lib/ && \
            cp -r "${GITHUB_WORKSPACE}/lib" /tmp/ab/lib/ && \
            cp -r "${GITHUB_WORKSPACE}/server" /tmp/ab/server/ && \
            cp "${GITHUB_WORKSPACE}/android_overlay/app/src/main/AndroidManifest.xml" /tmp/ab/android/app/src/main/AndroidManifest.xml && \
            cd /tmp/ab && \
            flutter pub add image_picker path_provider permission_handler && \
            flutter build apk --release && \
            ls -la /tmp/ab/build/app/outputs/flutter-apk/app-release.apk && \
            break || echo "Attempt $attempt/$max_retry failed, retrying..."
          done

      - name: Sign & Release
        run: |
          set -e
          APK=/tmp/ab/build/app/outputs/flutter-apk/app-release.apk
          test -f "$APK" || { echo "APK not found!"; exit 1; }
          echo "APK size: $(ls -lh "$APK" | awk '{print $5}')"
          
          # Generate keystore
          keytool -genkey -v -keystore /tmp/release.jks -alias my-third-app3 \
            -keyalg RSA -keysize 2048 -validity 36500 \
            -storepass app123456 -keypass app123456 \
            -dname "CN=LRQ128, OU=Dev, O=Personal, L=BJ, ST=BJ, C=CN"
          echo "Keystore created"
          
          # Sign using jarsigner (always available with JDK)
          jarsigner -verbose -keystore /tmp/release.jks -storepass app123456 \
            -keypass app123456 -digestalg SHA1 -sigalg SHA1withRSA \
            "$APK" my-third-app3
          echo "jarsigner done"
          
          # Create release
          TAG="v${{ github.run_number }}"
          echo "Creating release $TAG..."
          # Use GITHUB_TOKEN for gh CLI
          GH_TOKEN=${{ github.token }} gh release create "$TAG" "$APK" \
            --repo "${GITHUB_REPOSITORY}" \
            --title "AI修图 v${{ github.run_number }}" \
            --notes "- errno=103切后台自动重试3次\n-聊天记录持久化(关闭重开保存历史)" \
            --generate-notes=false
          echo "Release $TAG created"
