name: Build Release APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

env:
  PUB_HOSTED_URL: https://pub.flutter-io.cn
  FLUTTER_STORAGE_BASE_URL: https://storage.flutter-io.cn

jobs:
  build:
    permissions:
      contents: write
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.x'
          channel: 'stable'
          cache: true

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Build APK
        run: |
          set -ex
          max_retry=2
          for attempt in $(seq 0 $max_retry); do
            if [ $attempt -gt 0 ]; then echo "Retry $attempt..."; sleep 30; fi
            flutter create --project-name my_third_app3 --org com.lrq128 --platforms android /tmp/ab && \
            rm -rf /tmp/ab/lib/ && \
            cp -r "${GITHUB_WORKSPACE}/lib" /tmp/ab/lib/ && \
            cp -r "${GITHUB_WORKSPACE}/server" /tmp/ab/server/ && \
            cp "${GITHUB_WORKSPACE}/android_overlay/app/src/main/AndroidManifest.xml" /tmp/ab/android/app/src/main/AndroidManifest.xml && \
            keytool -genkey -v -keystore /tmp/ab/android/app/release.jks -alias my-third-app3 \
              -keyalg RSA -keysize 2048 -validity 36500 \
              -storepass mypass123 -keypass mypass123 \
              -dname "CN=LRQ128, OU=Dev, O=Personal, L=BJ, ST=BJ, C=CN" && \
            echo "storePassword=mypass123
keyPassword=mypass123
keyAlias=my-third-app3
storeFile=release.jks" > /tmp/ab/android/key.properties && \
            cd /tmp/ab && \
            flutter pub add image_picker path_provider permission_handler && \
            flutter build apk --release && \
            ls -la build/app/outputs/flutter-apk/app-release.apk && \
            break || echo "Attempt $attempt failed"
          done

      - name: Verify & Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -ex
          APK=/tmp/ab/build/app/outputs/flutter-apk/app-release.apk
          test -f "$APK" || { echo "No APK!"; find /tmp/ab/build -name "*.apk"; exit 1; }
          echo "APK size: $(stat --printf=%s $APK 2>/dev/null || wc -c < $APK)"
          
          TAG="v${{ github.run_number }}"
          gh release create "$TAG" "$APK" \
            --repo "${GITHUB_REPOSITORY}" \
            --title "AI修图 v${{ github.run_number }}" \
            --notes "修图App v${{ github.run_number }}" \
            --generate-notes=false
