name: Build Release APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

env:
  PUB_HOSTED_URL: https://pub.flutter-io.cn
  FLUTTER_STORAGE_BASE_URL: https://storage.flutter-io.cn

jobs:
  build:
    permissions:
      contents: write
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.x'
          channel: 'stable'
          cache: true

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Build APK
        run: |
          # Generate fresh project scaffolding
          flutter create --project-name my_third_app3 --org com.lrq128 --platforms android /tmp/ab
          
          # Copy our custom code
          rm -rf /tmp/ab/lib/
          cp -r "${GITHUB_WORKSPACE}/lib" /tmp/ab/lib/
          cp -r "${GITHUB_WORKSPACE}/server" /tmp/ab/server/
          
          # CRITICAL: Replace AndroidManifest with one that has INTERNET permission
          # Flutter 3.22.x's default template may NOT include it
          cat > /tmp/ab/android/app/src/main/AndroidManifest.xml << 'EOFXML'
<manifest xmlns:android="http://schemas.android.com/apk/res/android">
    <uses-permission android:name="android.permission.INTERNET"/>
    <uses-permission android:name="android.permission.CAMERA"/>
    <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE"/>
    <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE"/>
    <uses-permission android:name="android.permission.READ_MEDIA_IMAGES"/>

    <application
        android:label="AI修图"
        android:name="${applicationName}"
        android:icon="@mipmap/ic_launcher">
        <activity
            android:name=".MainActivity"
            android:exported="true"
            android:launchMode="singleTop"
            android:theme="@style/LaunchTheme"
            android:configChanges="orientation|keyboardHidden|keyboard|screenSize|smallestScreenSize|locale|layoutDirection|fontScale|screenLayout|density|uiMode"
            android:hardwareAccelerated="true"
            android:windowSoftInputMode="adjustResize">
            <meta-data
                android:name="io.flutter.embedding.android.NormalTheme"
                android:resource="@style/NormalTheme"/>
            <intent-filter>
                <action android:name="android.intent.action.MAIN"/>
                <category android:name="android.intent.category.LAUNCHER"/>
            </intent-filter>
        </activity>
        <meta-data
            android:name="flutterEmbedding"
            android:value="2"/>
    </application>
</manifest>
EOFXML
          
          echo "=== AndroidManifest.xml ==="
          cat /tmp/ab/android/app/src/main/AndroidManifest.xml
          
          # Add dependencies
          cd /tmp/ab
          flutter pub add image_picker
          flutter pub add http
          flutter pub add path_provider
          flutter pub add permission_handler
          flutter pub add mime
          
          flutter build apk --release 2>&1 | tee /tmp/build.log; BUILD_EXIT=${PIPESTATUS[0]}; if [ $BUILD_EXIT -ne 0 ]; then echo '===== BUILD FAILED ====='; tail -80 /tmp/build.log; exit $BUILD_EXIT; fi

      - name: Verify INTERNET permission in APK
        run: |
          APK="/tmp/ab/build/app/outputs/flutter-apk/app-release.apk"
          test -f "$APK" || exit 1
          python3 -c "
import zipfile
with zipfile.ZipFile('$APK', 'r') as z:
    raw = z.read('AndroidManifest.xml')
    if b'INTERNET' in raw:
        print('✅ INTERNET permission confirmed in APK')
    else:
        print('❌ INTERNET permission MISSING!')
        exit(1)
"

      - name: Sign APK
        run: |
          APK="/tmp/ab/build/app/outputs/flutter-apk/app-release.apk"
          
          keytool -genkey -v \
            -keystore /tmp/release.jks \
            -alias my-third-app3 \
            -keyalg RSA -keysize 2048 -validity 36500 \
            -storepass app123456 -keypass app123456 \
            -dname "CN=LRQ128, OU=Dev, O=Personal, L=BJ, ST=BJ, C=CN"

          APKSIGNER=$(ls -d ${ANDROID_HOME}/build-tools/*/apksigner 2>/dev/null | sort -V | tail -1)
          [ -z "$APKSIGNER" ] && APKSIGNER=$(find /usr/local/lib/android -name "apksigner" -type f 2>/dev/null | sort -V | tail -1)
          
          "$APKSIGNER" sign \
            --ks /tmp/release.jks --ks-key-alias my-third-app3 \
            --ks-pass pass:app123456 --key-pass pass:app123456 \
            --v1-signing-enabled true --v2-signing-enabled true --v3-signing-enabled true \
            "$APK"
          "$APKSIGNER" verify --verbose "$APK"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: AI修图 v${{ github.run_number }}
          body: |
            ## AI修图 App v${{ github.run_number }}
            自动构建发布版本
          files: /tmp/ab/build/app/outputs/flutter-apk/app-release.apk
          generate_release_notes: false
