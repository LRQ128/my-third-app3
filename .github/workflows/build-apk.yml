name: Build Release APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.x'
          channel: 'stable'
          cache: true

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Build APK
        run: |
          set -ex
          flutter create --project-name my_third_app3 --org com.lrq128 --platforms android /tmp/ab
          rm -rf /tmp/ab/lib/
          cp -r "${GITHUB_WORKSPACE}/lib" /tmp/ab/lib/
          cp -r "${GITHUB_WORKSPACE}/server" /tmp/ab/server/
          cp "${GITHUB_WORKSPACE}/android_overlay/app/src/main/AndroidManifest.xml" /tmp/ab/android/app/src/main/AndroidManifest.xml
          cd /tmp/ab
          flutter pub add image_picker path_provider permission_handler
          flutter build apk --release
          ls -la /tmp/ab/build/app/outputs/flutter-apk/

      - name: Sign APK
        run: |
          set -ex
          APK="/tmp/ab/build/app/outputs/flutter-apk/app-release.apk"
          test -f "$APK" || { echo "APK not found at $APK"; find /tmp/ab/build -name "*.apk"; exit 1; }
          
          # Generate keystore
          keytool -genkey -v -keystore /tmp/release.jks -alias my-third-app3 \
            -keyalg RSA -keysize 2048 -validity 36500 \
            -storepass app123456 -keypass app123456 \
            -dname "CN=LRQ128, OU=Dev, O=Personal, L=BJ, ST=BJ, C=CN"
          
          # Try apksigner
          APKSIGNER=$(ls ${ANDROID_HOME}/build-tools/*/apksigner 2>/dev/null | sort -V | tail -1 || echo "")
          if [ -n "$APKSIGNER" ]; then
            echo "Using apksigner: $APKSIGNER"
            "$APKSIGNER" sign --ks /tmp/release.jks --ks-key-alias my-third-app3 \
              --ks-pass pass:app123456 --key-pass pass:app123456 "$APK"
          else
            echo "apksigner not found, trying jarsigner"
            jarsigner -verbose -keystore /tmp/release.jks -storepass app123456 \
              -keypass app123456 "$APK" my-third-app3
          fi

      - name: Verify & Release
        run: |
          set -ex
          APK="/tmp/ab/build/app/outputs/flutter-apk/app-release.apk"
          APKSIGNER=$(ls ${ANDROID_HOME}/build-tools/*/apksigner 2>/dev/null | sort -V | tail -1 || echo "")
          if [ -n "$APKSIGNER" ]; then
            "$APKSIGNER" verify --verbose "$APK" 2>&1 || echo "Verify had warnings"
          fi
          # Create release via API
          TAG="v${{ github.run_number }}"
          gh release create "$TAG" "$APK" \
            --repo "${GITHUB_REPOSITORY}" \
            --title "AI修图 v${{ github.run_number }}" \
            --notes "自动构建发布版本" \
            --generate-notes=false
