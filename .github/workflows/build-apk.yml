name: Build Release APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.19.0'

      - name: Install dependencies
        run: flutter pub get

      - name: Build release APK
        run: flutter build apk --release

      - name: Generate keystore and sign APK
        run: |
          keytool -genkey -v \
            -keystore android/app/release.jks \
            -alias my-third-app3 \
            -keyalg RSA -keysize 2048 -validity 36500 \
            -storepass app123456 -keypass app123456 \
            -dname "CN=LRQ128, OU=Dev, O=Personal, L=BJ, ST=BJ, C=CN"

          APKSIGNER=$(ls -d ${ANDROID_HOME}/build-tools/*/apksigner 2>/dev/null | sort -V | tail -1)
          if [ -z "$APKSIGNER" ]; then
            APKSIGNER=$(find /usr/local/lib/android -name "apksigner" -type f 2>/dev/null | sort -V | tail -1)
          fi
          "$APKSIGNER" sign \
            --ks android/app/release.jks --ks-key-alias my-third-app3 \
            --ks-pass pass:app123456 --key-pass pass:app123456 \
            --v1-signing-enabled true --v2-signing-enabled true --v3-signing-enabled true \
            build/app/outputs/flutter-apk/app-release.apk
          "$APKSIGNER" verify --verbose build/app/outputs/flutter-apk/app-release.apk

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: AI修图 v${{ github.run_number }}
          body: |
            ## AI修图 App v${{ github.run_number }}
            自动构建发布版本
          files: build/app/outputs/flutter-apk/app-release.apk
          generate_release_notes: false
