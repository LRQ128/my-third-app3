name: Build Release APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

env:
  PUB_HOSTED_URL: https://pub.flutter-io.cn
  FLUTTER_STORAGE_BASE_URL: https://storage.flutter-io.cn

jobs:
  build:
    permissions:
      contents: write
      actions: read
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.x'
          channel: 'stable'
          cache: true

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Build APK
        run: |
          set -ex
          max_retry=2
          for attempt in $(seq 0 $max_retry); do
            if [ $attempt -gt 0 ]; then echo "Retry $attempt..."; sleep 30; fi
            flutter create --project-name my_third_app3 --org com.lrq128 --platforms android /tmp/ab && \
            rm -rf /tmp/ab/lib/ && \
            cp -r "${GITHUB_WORKSPACE}/lib" /tmp/ab/lib/ && \
            cp -r "${GITHUB_WORKSPACE}/server" /tmp/ab/server/ && \
            cp "${GITHUB_WORKSPACE}/android_overlay/app/src/main/AndroidManifest.xml" /tmp/ab/android/app/src/main/AndroidManifest.xml && \
            cd /tmp/ab && \
            flutter pub add image_picker path_provider permission_handler && \
            flutter build apk --release && \
            ls -la build/app/outputs/flutter-apk/app-release.apk && \
            break || echo "Attempt $attempt failed"
          done

      - name: Sign APK
        run: |
          set -ex
          APK=/tmp/ab/build/app/outputs/flutter-apk/app-release.apk
          test -f "$APK" || { echo "APK not found!"; exit 1; }
          
          # Check if APK is already signed v1+v2
          python3 -c "
import zipfile, sys
with zipfile.ZipFile(sys.argv[1], 'r') as z:
    names = z.namelist()
    has_meta = any(n.startswith('META-INF/') for n in names)
    has_sigblk = any('.SIG' in n or 'APK' in n for n in names)
    print(f'META-INF: {\"✅\" if has_meta else \"❌\"}')
    print(f'SigBlock: {\"✅\" if has_sigblk else \"❌\"}')
" "$APK"
          
          keytool -genkey -v -keystore /tmp/release.jks -alias my-third-app3 \
            -keyalg RSA -keysize 2048 -validity 36500 \
            -storepass app123456 -keypass app123456 \
            -dname "CN=LRQ128, OU=Dev, O=Personal, L=BJ, ST=BJ, C=CN"
          
          # Try apksigner first
          APKSIGNER=$(ls -d ${ANDROID_HOME}/build-tools/*/apksigner 2>/dev/null | sort -V | tail -1 || true)
          if [ -n "$APKSIGNER" ]; then
            echo "Using apksigner: $APKSIGNER"
            "$APKSIGNER" sign --ks /tmp/release.jks --ks-key-alias my-third-app3 \
              --ks-pass pass:app123456 --key-pass pass:app123456 "$APK"
            "$APKSIGNER" verify --verbose "$APK" 2>&1
          else
            echo "apksigner not found, checking alternatives..."
            which jarsigner || echo "no jarsigner"
            find / -name "jarsigner" -type f 2>/dev/null || echo "no jarsigner anywhere"
            exit 1
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: AI修图 v${{ github.run_number }}
          body: |
            ## AI修图 App v${{ github.run_number }}
            - errno=103切后台自动重试3次
            - 聊天记录持久化(关闭重开保存历史)
          files: /tmp/ab/build/app/outputs/flutter-apk/app-release.apk
          generate_release_notes: false
